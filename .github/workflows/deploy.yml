name: Deploy a producción

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lorindo-api:latest
            ghcr.io/${{ github.repository_owner }}/lorindo-api:${{ github.sha }}

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lorindo-web:latest
            ghcr.io/${{ github.repository_owner }}/lorindo-web:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/lorindo/infra
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec api pnpm prisma migrate deploy
            docker image prune -f
            echo "Deploy completado: $(date)"
