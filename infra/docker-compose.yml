version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lorindo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lorindo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: lorindo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lorindo -d lorindo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lorindo_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: lorindo_api
    restart: unless-stopped
    env_file: ../apps/api/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      retries: 3

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: lorindo_web
    restart: unless-stopped
    env_file: ../apps/web/.env
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.worker
    container_name: lorindo_worker
    restart: unless-stopped
    env_file: ../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
